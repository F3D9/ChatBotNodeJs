<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="styles.css">
    <script src="register.js" defer></script>
</head>

<body>

<nav class="navbar">
    <div class="nav-links">
        <a href="/">Chat</a>
        <a href="/login">Login</a>
        <a href="/register" class="active">Register</a>
    </div>
</nav>

<main class="app">
    <section class="card auth-card">
        <header class="header">
            <h1 class="title">Crear cuenta</h1>
            <p class="subtitle">Completá tus datos para registrarte</p>
        </header>

        <form class="auth-form" id="register-form">
            <div class="input" id="user">
                <input type="text" placeholder="Nombre completo" required autocomplete="name">
            </div>

            <div class="input" id="email">
                <input type="email" placeholder="Correo electrónico" required autocomplete="email">
            </div>

            <div class="input" id="password">
                <input type="password" placeholder="Contraseña" required autocomplete="new-password">
            </div>

            <button type="submit" class="send">Registrarse</button>
        </form>

        <p class="auth-footer">
            ¿Ya tenés cuenta? <a href="/login">Iniciá sesión</a>
        </p>
    </section>
</main>

</body>
</html>
