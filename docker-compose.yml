services:
  backend:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres 
      
  postgres:
    image: postgres:15
    ports:
      - "5430:5432"
    volumes:
      - ./source/db.sql:/docker-entrypoint-initdb.d/db.sql
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=Users